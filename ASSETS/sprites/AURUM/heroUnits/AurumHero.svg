    Q160,440 160,340
    L160,186 Z" opacity="0.4"/>
  <!-- Gold coin center symbol -->
  <circle class="cls-1" cx="300" cy="310" r="66"/>
  <circle class="cls-1" cx="300" cy="310" r="46" opacity="0.4"/>
</svg>
