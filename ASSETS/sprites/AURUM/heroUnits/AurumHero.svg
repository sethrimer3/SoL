<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <style>.cls-1 { fill: #fefefe; }</style>
  </defs>
  <!-- Aurum shield / crest shape -->
  <!-- Shield outline -->
  <path class="cls-1" d="
    M300,60
    L500,140
    L500,340
    Q500,480 300,560
    Q100,480 100,340
    L100,140 Z"/>
  <!-- Inner shield decoration – smaller inset shield -->
